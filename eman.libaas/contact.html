    <!-- NAVBAR -->
    <nav>
        <div class="logo">
            <h1>EMAN.LIBAAS</h1>

    <h1 class="title">Get In Touch</h1>

    <div class="hero-content" style="padding: 0 15%;">
        <p class="text" style="margin-bottom: 30px;">Have questions or want to place a custom order? Fill out the form below.</p>
        
        <form class="form" style="background: white; padding: 40px; border-radius: 20px; box-shadow: var(--shadow);">
            <div style="display: flex; flex-direction: column; gap: 5px; text-align: left;">
                <label style="font-weight: 600; font-size: 0.9rem;">Name</label>
                <input type="text" placeholder="Your Full Name">
            </div>
            <div style="display: flex; flex-direction: column; gap: 5px; text-align: left;">
                <label style="font-weight: 600; font-size: 0.9rem;">Email</label>
                <input type="email" placeholder="your@email.com">
            </div>
            <div style="display: flex; flex-direction: column; gap: 5px; text-align: left;">
                <label style="font-weight: 600; font-size: 0.9rem;">Message</label>
                <textarea rows="5" placeholder="How can we help you?"></textarea>
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 10px;">Send Message</button>
        </form>
    </div>

    <!-- FOOTER -->
